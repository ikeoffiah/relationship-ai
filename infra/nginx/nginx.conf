# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy  —  REL-14: TLS 1.3 enforcement for RelationshipAI
# ─────────────────────────────────────────────────────────────────────────────
#
# This configuration:
#   • Terminates TLS 1.3 (TLS 1.2 disabled where the deployment allows it).
#   • Enables OCSP stapling to cut one round-trip from the TLS handshake and
#     let clients verify certificate revocation without calling the CA.
#   • Sets HSTS with 1-year max-age, subdomains, and preload.
#   • Proxies /      → Django REST service  (port 8000)
#   • Proxies /ws/   → FastAPI WebSocket service (port 8001)
#
# Prerequisites
# ─────────────────────────────────────────────────────────────────────────────
#   1. Place your certificate chain at /etc/nginx/certs/fullchain.pem
#   2. Place your private key at       /etc/nginx/certs/privkey.pem
#   3. Place the OCSP resolver chain at /etc/nginx/certs/chain.pem
#
# Generate OCSP resolver chain from Let's Encrypt:
#   cp /etc/nginx/certs/chain.pem /etc/nginx/certs/chain.pem
#
# Reload after any certificate rotation:
#   nginx -s reload


# ─── Worker process settings ─────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # ── Global TLS / SSL defaults ──────────────────────────────────────────────
    # Ciphers ordered from strongest to weakest; TLS 1.3 uses its own built-in
    # cipher list so the ssl_ciphers directive applies only to TLS 1.2 sessions
    # (retained here for load balancer / older-client compatibility).
    ssl_protocols              TLSv1.3;   # TLS 1.2 disabled — enable if needed:
                                           # TLSv1.2 TLSv1.3;
    ssl_ciphers                TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers  on;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;     # Disable session tickets for PFS

    # ── OCSP Stapling ──────────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen       80;
        server_name  api.relationshipai.com ws.relationshipai.com;

        # ACME challenge (Let's Encrypt certificate renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        http2       on;
        server_name api.relationshipai.com ws.relationshipai.com;

        ssl_certificate      /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key  /etc/nginx/certs/privkey.pem;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        # HSTS — 1-year max-age, include subdomains, preload list eligible.
        # "always" ensures the header is set even on error responses.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                       always;
        add_header X-Frame-Options           "DENY"                                          always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
        add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'"   always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

        # ── WebSocket proxy → FastAPI (port 8001) ──────────────────────────────
        location /ws/ {
            proxy_pass          http://fastapi:8001;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade            $http_upgrade;
            proxy_set_header    Connection         "upgrade";
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── REST proxy → Django (port 8000) ───────────────────────────────────
        location / {
            proxy_pass          http://django:8000;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}
