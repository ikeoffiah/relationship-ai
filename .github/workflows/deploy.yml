name: Deploy

on:
  push:
    branches: [ prod ]
  pull_request:
    branches: [ prod ]
    paths:
      - 'backend-django/**'
      - 'backend-fastapi/**'
      - 'shared/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [django-ci, fastapi-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Django to Railway
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          railway up --service backend-django
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy FastAPI to Railway
        run: railway up --service backend-fastapi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run smoke tests
        run: |
          sleep 15  # wait for deploy to propagate
          curl -f https://django.up.railway.app/health/ || exit 1
          curl -f https://fastapi.up.railway.app/health/ || exit 1