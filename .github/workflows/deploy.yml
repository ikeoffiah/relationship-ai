name: Deploy

on:
  workflow_run:
    workflows: ["Django CI", "FastAPI CI"]
    branches: [ prod ]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy Django to Railway
        run: railway up --service backend-django -v
        working-directory: backend-django/
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy FastAPI to Railway
        run: railway up --service backend-fastapi -v
        working-directory: backend-fastapi/
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run smoke tests
        run: |
          sleep 15  # wait for deploy to propagate
          curl -f https://django.up.railway.app/health/ || exit 1
          curl -f https://fastapi.up.railway.app/health/ || exit 1