services:
  postgres:
    image: supabase/postgres:14.1.0 # matches Supabase prod version
    environment:
      POSTGRES_PASSWORD: localdevonly
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  django:
    build: ./backend-django
    env_file: ./backend-django/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]
    volumes: ["./backend-django:/app"]

  fastapi:
    build: ./backend-fastapi
    env_file: ./backend-fastapi/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8001-8002:8001"]
    deploy:
      replicas: 2
    volumes: ["./backend-fastapi:/app"]

  celery:
    build: ./backend-django
    command: celery -A config worker -l info -Q celery,memory_updates,insight_synthesis,notifications,exports
    env_file: ./backend-django/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build: ./backend-django
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ./backend-django/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - django
      - fastapi

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # ── REL-14: TLS termination ─────────────────────────────────────────────────
  # Nginx terminates TLS 1.3 and proxies HTTPS traffic to Django and FastAPI.
  #
  # Before starting in production:
  #   1. Place your certificate chain at ./infra/nginx/certs/fullchain.pem
  #   2. Place your private key at       ./infra/nginx/certs/privkey.pem
  #   3. Place the OCSP chain at         ./infra/nginx/certs/chain.pem
  #
  # For local development you can skip this service and hit 8000/8001 directly.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - ./infra/nginx/www:/var/www/certbot:ro
    depends_on:
      - django
      - fastapi
    restart: unless-stopped
