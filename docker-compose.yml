services:
  postgres:
    image: supabase/postgres:14.1.0 # matches Supabase prod version
    environment:
      POSTGRES_PASSWORD: localdevonly
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  django:
    build: ./backend-django
    env_file: ./backend-django/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8000:8000"]
    volumes: ["./backend-django:/app"]

  fastapi:
    build: ./backend-fastapi
    env_file: ./backend-fastapi/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["8001:8001"]
    volumes: ["./backend-fastapi:/app"]

  celery:
    build: ./backend-django
    command: celery -A config worker -l info
    env_file: ./backend-django/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - django
      - fastapi

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
